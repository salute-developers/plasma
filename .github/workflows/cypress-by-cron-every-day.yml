name: Cypress component testing by schedule every day at midnight

on:
  schedule:
    - cron: 0 0 * * *

jobs:
  cypress_plasma:
    name: "Cypress for plasma packages"
    strategy:
      fail-fast: false
      matrix:
        scope: [web,b2c,ui,giga]
        browser: ['', 'webkit']

    uses: ./.github/workflows/cypress-common.yml
    with:
      scope: ${{ matrix.scope }}
      prefix: "plasma"
      browser: ${{ matrix.browser }}
    secrets: inherit

  cypress_sdds:
    name: "Cypress for sdds packages"
    strategy:
      fail-fast: false
      matrix:
        scope: [cs,insol]
        browser: ['', 'webkit']

    uses: ./.github/workflows/cypress-common.yml
    with:
      scope: ${{ matrix.scope }}
      prefix: "sdds"
      browser: ${{ matrix.browser }}
    secrets: inherit

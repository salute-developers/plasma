name: Next.js Pages Router build check

on:
    pull_request:
        branches:
            - dev
            - master
        paths:
            # Запускаем только когда меняются new-hope, его зависимости или сам e2e-тест
            - 'packages/plasma-new-hope/**'
            - 'e2e/nextjs-pages/**'

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build & type-check (sdds-serv + Next.js pages router)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  show-progress: false

            - name: Prepare environment
              uses: ./.github/actions/prepare-environment

            - name: Bootstrap sdds-serv and its dependencies
              run: npm run bootstrap:sdds-serv

            - name: Install Next.js app dependencies
              run: npm install --legacy-peer-deps --ignore-scripts
              working-directory: e2e/nextjs-pages

            - name: TypeScript type-check
              run: npm run type-check
              working-directory: e2e/nextjs-pages

            - name: Next.js build
              run: npm run build
              working-directory: e2e/nextjs-pages
